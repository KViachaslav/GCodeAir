





<canvas id="c"></canvas>





<script>
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  async function load() {
    const res = await fetch("/api/drawing", { cache: "no-store" });
    const data = await res.json();

    canvas.width = data.width;
    canvas.height = data.height;

    // белый фон
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const item of data.items) {
      if (item.type === "line") {
        ctx.strokeStyle = item.stroke || "#000";
        ctx.lineWidth = item.w || 1;
        ctx.beginPath();
        ctx.moveTo(item.x1, item.y1);
        ctx.lineTo(item.x2, item.y2);
        ctx.stroke();
      }

      if (item.type === "circle") {
        ctx.strokeStyle = item.stroke || "#000";
        ctx.lineWidth = item.w || 1;
        ctx.beginPath();
        ctx.arc(item.cx, item.cy, item.r, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (item.type === "poly") {
        ctx.strokeStyle = item.stroke || "#000";
        ctx.lineWidth = item.w || 1;

        ctx.beginPath();
        const [p0, ...rest] = item.points;
        ctx.moveTo(p0[0], p0[1]);
        for (const p of rest) ctx.lineTo(p[0], p[1]);
        ctx.closePath();

        if (item.fill) {
          ctx.fillStyle = item.fill;
          ctx.fill();
        }
        ctx.stroke();
      }
    }
  }

  load();
</script>
